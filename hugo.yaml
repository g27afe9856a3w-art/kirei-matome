baseURL: "https://kirei-matome.com/"
languageCode: "ja"
title: "キレイまとめ｜脱毛・美容医療・健康の比較サイト"
theme: "PaperMod"
paginate: 10

enableRobotsTXT: true

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    style: monokai
    lineNos: false
    codeFences: true

buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "キレイまとめ"
  description: "脱毛・美容医療・健康サプリを徹底比較。あなたに合ったサービスが必ず見つかる！最新料金・口コミ・体験談を詳しく解説。"

  # Google Search Console認証コード（Search Consoleで取得した英数字を貼り付け）
  # 例: googleSiteVerification: "abcdefg123456"
  googleSiteVerification: ""

  # Bing Webmaster Tools認証コード（任意）
  bingSiteVerification: ""

  # Google Analytics 4 測定ID（例: G-XXXXXXXXXX）
  googleAnalytics: ""
  keywords:
    - 脱毛
    - 美容医療
    - 脱毛クリニック比較
    - 健康サプリ
    - 美容比較
    - 脱毛おすすめ
    - スキンケア
  author: "キレイまとめ編集部"
  images:
    - "/images/eyecatch/ogp-main.jpeg"

  defaultTheme: light
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: true

  label:
    text: "💄 キレイまとめ"

  profileMode:
    enabled: false

  homeInfoParams:
    Title: "💄 キレイまとめ｜あなたの「キレイ」を最短で叶える比較メディア"
    Content: >
      「脱毛ってどこが安いの？」「美容サプリって効果あるの？」「節約しながらキレイになりたい…」
      そんな悩みを、**編集部が実際に比較・調査**して解決します。


      ✅ 料金・口コミ・効果を**本音でレビュー**

      ✅ あなたに合うサービスが**3分で見つかる**

      ✅ **最新キャンペーン**を毎月更新


      ▶ [🏆 脱毛クリニックTOP5](/posts/datsumo-clinic-ranking/) ／
      [💄 美容医療](/categories/biyou/) ／
      [💊 健康・サプリ](/categories/kenko/) ／
      [💰 節約・ポイ活](/categories/okane/)

  socialIcons:
    - name: twitter
      url: "https://twitter.com/"

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false
    linkFullImages: true
    responsiveImages: true

  footer:
    hideCopyright: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys:
      - title
      - permalink
      - summary
      - content

menu:
  main:
    - identifier: datsumo
      name: "✨ 脱毛比較"
      url: /categories/datsumo/
      weight: 10
    - identifier: biyou
      name: "💄 美容医療"
      url: /categories/biyou/
      weight: 20
    - identifier: kenko
      name: "💊 健康・サプリ"
      url: /categories/kenko/
      weight: 30
    - identifier: okane
      name: "💰 節約・お金"
      url: /categories/okane/
      weight: 35
    - identifier: ranking
      name: "🏆 ランキング"
      url: /ranking/
      weight: 40
    - identifier: search
      name: "🔍 検索"
      url: /search/
      weight: 50
    - identifier: about
      name: "このサイトについて"
      url: /about/
      weight: 60
    - identifier: privacy
      name: "プライバシーポリシー"
      url: /privacy-policy/
      weight: 70

outputs:
  home:
    - HTML
    - RSS
    - JSON

taxonomies:
  category: categories
  tag: tags
